server_tokens off;

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/lab3.crt;
    ssl_certificate_key /etc/nginx/certs/lab3.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Content-Security-Policy and X-Frame-Options are already sent natively by
    # Grafana on every path, so they are left out here to avoid a duplicate/
    # conflicting entry. X-Content-Type-Options is set by Grafana on most but
    # not all paths (e.g. missing on /robots.txt and some /public/img assets),
    # so it is set here too -- a redundant identical value on the paths Grafana
    # already covers is harmless, unlike duplicate X-Frame-Options values.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Grafana live/websocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
