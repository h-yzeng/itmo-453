apiVersion: 1

groups:
  - orgId: 1
    name: infrastructure
    folder: Infrastructure Alerts
    interval: 1m
    rules:
      - uid: high_cpu_usage
        title: High CPU Usage
        condition: C
        for: 1m
        noDataState: NoData
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Processor utilization is above 80 percent
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus_ds
            model:
              refId: A
              instant: true
              editorMode: code
              expr: '100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [80]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
              intervalMs: 1000
              maxDataPoints: 43200

      - uid: low_disk_space
        title: Low Disk Space
        condition: C
        for: 1m
        noDataState: NoData
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: Free disk space on the root filesystem is below 15 percent
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus_ds
            model:
              refId: A
              instant: true
              editorMode: code
              expr: '(node_filesystem_avail_bytes{mountpoint="/mnt/docker-desktop-disk"} / node_filesystem_size_bytes{mountpoint="/mnt/docker-desktop-disk"}) * 100'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [15]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
              intervalMs: 1000
              maxDataPoints: 43200

      - uid: instance_down
        title: Node Exporter Down
        condition: C
        for: 1m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: The Node Exporter target is not responding
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus_ds
            model:
              refId: A
              instant: true
              editorMode: code
              expr: 'up{job="node"}'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
              intervalMs: 1000
              maxDataPoints: 43200

  - orgId: 1
    name: security
    folder: Security Alerts
    interval: 1m
    rules:
      - uid: failed_logins
        title: Failed Login Attempts
        condition: C
        for: 0m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: More than 5 failed Grafana login attempts in the last 5 minutes
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: loki_ds
            model:
              refId: A
              queryType: instant
              editorMode: code
              expr: 'sum(count_over_time({container="grafana"} |= "failed to authenticate identity" != "lokiPath=" [5m]))'
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [5]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
              intervalMs: 1000
              maxDataPoints: 43200
