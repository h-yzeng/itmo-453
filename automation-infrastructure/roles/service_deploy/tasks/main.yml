---
# Deploy the operational service with security and logging settings applied
- name: Deploy service container
  community.docker.docker_container:
    name: "{{ service_name }}"
    image: "{{ service_image }}"
    state: started
    restart_policy: always
    published_ports:
      - "{{ service_port }}:8080"

    # Security baseline applied directly on the container
    user: "{{ container_user }}"
    cap_drop:
      - ALL
    memory: "{{ container_memory_limit }}"
    cpus: "{{ container_cpu_limit | float }}"
    security_opts:
      - no-new-privileges:true

    # Logging baseline, rotated json logs instead of unbounded growth
    log_driver: json-file
    log_options:
      max-size: "{{ log_max_size }}"
      max-file: "{{ log_max_files }}"
