---
# Confirm Docker is installed before anything else runs
- name: Check Docker is installed
  command: docker --version
  register: docker_check
  changed_when: false

- name: Fail early if Docker is missing
  fail:
    msg: "Docker is required but was not found. Install Docker before running this playbook."
  when: docker_check.rc != 0

# Pull images over HTTPS only, registry already enforces this by default,
# this task documents the assumption explicitly for the security review
- name: Confirm Docker daemon is reachable
  command: docker info
  register: docker_info
  changed_when: false
